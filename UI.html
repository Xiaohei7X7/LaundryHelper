<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>LaundryHelper 智能洗衣助手</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- 使用 Vue 3 CDN -->
    <script type="module" src="https://unpkg.com/vue@3/dist/vue.esm-browser.js"></script>
    <!-- 简单的 modern UI 样式 -->
    <style>
      :root {
        --bg: #0f172a;
        --bg-elevated: #111827;
        --accent: #38bdf8;
        --accent-soft: rgba(56, 189, 248, 0.1);
        --border-subtle: rgba(148, 163, 184, 0.4);
        --text-main: #e5e7eb;
        --text-muted: #9ca3af;
        --danger: #f97373;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        background: radial-gradient(circle at top, #1f2937, #020617);
        color: var(--text-main);
      }

      .app-shell {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      .card {
        width: 100%;
        max-width: 1080px;
        background: linear-gradient(
            135deg,
            rgba(148, 163, 184, 0.12),
            rgba(15, 118, 110, 0.16)
          ),
          var(--bg-elevated);
        border-radius: 20px;
        border: 1px solid rgba(148, 163, 184, 0.3);
        box-shadow: 0 24px 60px rgba(15, 23, 42, 0.9);
        padding: 24px 26px;
        display: grid;
        grid-template-columns: minmax(0, 3fr) minmax(0, 2.4fr);
        gap: 20px;
      }

      @media (max-width: 900px) {
        .card {
          display: flex;
          flex-direction: column;
        }
      }

      .card-left,
      .card-right {
        min-width: 0;
      }

      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 18px;
        gap: 12px;
      }

      .title-group h1 {
        margin: 0;
        font-size: 1.4rem;
        letter-spacing: 0.03em;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .title-pill {
        font-size: 0.78rem;
        padding: 3px 7px;
        border-radius: 999px;
        background: rgba(15, 23, 42, 0.75);
        border: 1px solid rgba(56, 189, 248, 0.4);
        color: var(--accent);
      }

      .title-group p {
        margin: 4px 0 0;
        font-size: 0.82rem;
        color: var(--text-muted);
      }

      .badge {
        padding: 6px 10px;
        border-radius: 999px;
        border: 1px solid rgba(148, 163, 184, 0.5);
        font-size: 0.78rem;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        color: var(--text-muted);
        white-space: nowrap;
      }

      .badge-dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: #22c55e;
        box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.35);
      }

      .section {
        background: radial-gradient(circle at top left, #1f2937, #020617);
        border-radius: 16px;
        border: 1px solid rgba(148, 163, 184, 0.3);
        padding: 14px 15px 16px;
        margin-bottom: 14px;
      }

      .section-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 10px;
      }

      .section-title {
        font-size: 0.9rem;
        font-weight: 600;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: var(--text-muted);
      }

      .hint {
        font-size: 0.78rem;
        color: var(--text-muted);
      }

      .upload-area {
        border-radius: 14px;
        border: 1px dashed rgba(148, 163, 184, 0.9);
        padding: 18px 16px;
        background: radial-gradient(circle at top, rgba(56, 189, 248, 0.09), transparent);
        display: flex;
        align-items: center;
        gap: 14px;
      }

      .upload-circle {
        width: 56px;
        height: 56px;
        border-radius: 18px;
        background: radial-gradient(circle at top, rgba(56, 189, 248, 0.4), #020617);
        display: flex;
        align-items: center;
        justify-content: center;
        border: 1px solid rgba(56, 189, 248, 0.7);
        box-shadow: 0 10px 26px rgba(8, 47, 73, 0.85);
        flex-shrink: 0;
      }

      .upload-circle svg {
        width: 30px;
        height: 30px;
        color: #e0f2fe;
      }

      .upload-copy {
        flex: 1;
      }

      .upload-copy-main {
        font-size: 0.95rem;
        margin-bottom: 4px;
      }

      .upload-copy-main span {
        color: var(--accent);
        font-weight: 600;
      }

      .upload-copy-sub {
        font-size: 0.78rem;
        color: var(--text-muted);
      }

      .upload-actions {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 6px;
      }

      .btn {
        border: none;
        cursor: pointer;
        border-radius: 999px;
        padding: 7px 13px;
        font-size: 0.82rem;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-weight: 500;
        background: rgba(15, 23, 42, 0.9);
        color: var(--text-main);
        border: 1px solid rgba(148, 163, 184, 0.7);
        transition: all 0.16s ease-out;
      }

      .btn-primary {
        background: linear-gradient(to right, #38bdf8, #22c55e);
        color: #0b1120;
        border: none;
      }

      .btn-primary:hover {
        filter: brightness(1.05);
        transform: translateY(-0.5px);
        box-shadow: 0 10px 30px rgba(56, 189, 248, 0.3);
      }

      .btn[disabled] {
        opacity: 0.5;
        cursor: not-allowed;
        box-shadow: none;
        transform: none;
      }

      .btn-secondary {
        background: rgba(15, 23, 42, 0.9);
        color: var(--accent);
        border-color: rgba(56, 189, 248, 0.7);
      }

      .btn-secondary:hover {
        background: rgba(15, 23, 42, 1);
      }

      .upload-input {
        display: none;
      }

      .preview-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
        gap: 10px;
        margin-top: 12px;
        max-height: 220px;
        overflow-y: auto;
        padding-right: 4px;
      }

      .preview-item {
        position: relative;
        overflow: hidden;
        border-radius: 12px;
        border: 1px solid rgba(148, 163, 184, 0.7);
        background: rgba(15, 23, 42, 0.9);
      }

      .preview-item img {
        display: block;
        width: 100%;
        height: 110px;
        object-fit: cover;
      }

      .preview-meta {
        padding: 6px 7px 7px;
        font-size: 0.75rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
        color: var(--text-muted);
      }

      .preview-remove {
        cursor: pointer;
        border-radius: 999px;
        padding: 2px 7px;
        border: 1px solid rgba(248, 113, 113, 0.6);
        color: #fecaca;
        background: rgba(127, 29, 29, 0.4);
        font-size: 0.7rem;
      }

      .form-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      @media (max-width: 600px) {
        .form-grid {
          grid-template-columns: minmax(0, 1fr);
        }
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 4px;
        font-size: 0.84rem;
      }

      .field label {
        color: var(--text-muted);
      }

      .field input,
      .field select,
      .field textarea {
        background: rgba(15, 23, 42, 0.98);
        border-radius: 10px;
        border: 1px solid rgba(148, 163, 184, 0.7);
        padding: 6px 9px;
        color: var(--text-main);
        font-size: 0.85rem;
        outline: none;
        transition: border-color 0.16s, box-shadow 0.16s, background 0.16s;
      }

      .field input:focus,
      .field select:focus,
      .field textarea:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 1px rgba(56, 189, 248, 0.4);
        background: rgba(15, 23, 42, 1);
      }

      .field textarea {
        resize: vertical;
        min-height: 64px;
        max-height: 140px;
      }

      .field small {
        font-size: 0.74rem;
        color: var(--text-muted);
      }

      .chips {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 6px;
      }

      .chip {
        padding: 3px 8px;
        border-radius: 999px;
        background: rgba(15, 23, 42, 0.95);
        border: 1px solid rgba(148, 163, 184, 0.7);
        font-size: 0.72rem;
        color: var(--text-muted);
        cursor: pointer;
      }

      .chip:hover {
        border-color: rgba(56, 189, 248, 0.7);
        color: var(--accent);
      }

      .submit-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 12px;
        gap: 8px;
        flex-wrap: wrap;
      }

      .status-text {
        font-size: 0.8rem;
        color: var(--text-muted);
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .status-dot {
        width: 7px;
        height: 7px;
        border-radius: 999px;
        background: rgba(148, 163, 184, 0.9);
      }

      .status-dot.active {
        background: #38bdf8;
        box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.45);
      }

      .result-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 8px;
      }

      .result-title {
        font-size: 0.9rem;
        font-weight: 600;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: var(--text-muted);
      }

      .tag {
        font-size: 0.74rem;
        padding: 3px 8px;
        border-radius: 999px;
        background: rgba(15, 23, 42, 0.95);
        border: 1px solid rgba(148, 163, 184, 0.7);
        color: var(--text-muted);
      }

      .result-body {
        border-radius: 14px;
        border: 1px solid rgba(148, 163, 184, 0.6);
        padding: 10px 11px;
        background: radial-gradient(circle at top, rgba(15, 23, 42, 0.9), #020617);
        min-height: 140px;
        max-height: 260px;
        overflow-y: auto;
      }

      .empty-hint {
        font-size: 0.8rem;
        color: var(--text-muted);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100%;
        text-align: center;
        gap: 4px;
      }

      .empty-hint span {
        font-size: 1.7rem;
      }

      .suggestion-list {
        list-style: none;
        margin: 0;
        padding-left: 0;
        display: flex;
        flex-direction: column;
        gap: 8px;
        font-size: 0.86rem;
      }

      .suggestion-item {
        display: flex;
        gap: 7px;
      }

      .suggestion-index {
        width: 18px;
        height: 18px;
        border-radius: 999px;
        border: 1px solid rgba(148, 163, 184, 0.7);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.7rem;
        color: var(--text-muted);
        flex-shrink: 0;
        margin-top: 2px;
      }

      .suggestion-content {
        flex: 1;
      }

      .suggestion-title {
        font-weight: 500;
        margin-bottom: 2px;
      }

      .suggestion-detail {
        color: var(--text-muted);
      }

      .error-box {
        margin-top: 8px;
        font-size: 0.8rem;
        color: #fecaca;
        background: rgba(127, 29, 29, 0.5);
        border-radius: 10px;
        padding: 7px 9px;
        border: 1px solid rgba(248, 113, 113, 0.7);
      }
    </style>
  </head>

  <body>
    <div id="app" class="app-shell"></div>

    <script type="module">
      import { createApp, ref, computed } from "https://unpkg.com/vue@3/dist/vue.esm-browser.js";

      const App = {
        setup() {
          const selectedFiles = ref([]);
          const previews = ref([]);

          const clothType = ref("");
          const color = ref("");
          const material = ref("");
          const stains = ref("");
          const extraNotes = ref("");

          const loading = ref(false);
          const error = ref("");

          const suggestions = ref([]);

          const canSubmit = computed(() => {
            return selectedFiles.value.length > 0 && !loading.value;
          });

          function handleFiles(files) {
            const fileArray = Array.from(files || []);
            if (!fileArray.length) return;

            error.value = "";

            fileArray.forEach((file) => {
              if (!file.type.startsWith("image/")) {
                error.value = "仅支持上传图片文件。";
                return;
              }

              const reader = new FileReader();
              reader.onload = (e) => {
                previews.value.push({
                  id: Date.now().toString() + Math.random().toString(16),
                  name: file.name,
                  sizeKb: Math.round(file.size / 1024),
                  url: e.target.result,
                });
              };
              reader.readAsDataURL(file);

              selectedFiles.value.push(file);
            });
          }

          function onFileChange(event) {
            const files = event.target.files;
            handleFiles(files);
            event.target.value = "";
          }

          function onDrop(event) {
            event.preventDefault();
            const files = event.dataTransfer.files;
            handleFiles(files);
          }

          function onDragOver(event) {
            event.preventDefault();
          }

          function removePreview(id) {
            const index = previews.value.findIndex((p) => p.id === id);
            if (index !== -1) {
              previews.value.splice(index, 1);
              selectedFiles.value.splice(index, 1);
            }
          }

          function fillChip(targetRef, value) {
            if (!value) return;
            targetRef.value = value;
          }

          async function submit() {
            if (!canSubmit.value) return;

            loading.value = true;
            error.value = "";
            suggestions.value = [];

            try {
              const formData = new FormData();
              selectedFiles.value.forEach((file, index) => {
                formData.append("images", file, file.name || `image_${index}.jpg`);
              });

              const meta = {
                clothType: clothType.value,
                color: color.value,
                material: material.value,
                stains: stains.value,
                extraNotes: extraNotes.value,
              };
              formData.append("meta", JSON.stringify(meta));

              // TODO: 将下面的 URL 替换为你自己的后端识别 API 地址
              const API_URL = "";
              if (!API_URL) {
                throw new Error("请先在前端代码中配置后端识别 API 地址（API_URL）。");
              }

              const response = await fetch(API_URL, {
                method: "POST",
                body: formData,
              });

              if (!response.ok) {
                throw new Error("后端接口返回错误状态：" + response.status);
              }

              const data = await response.json();

              const rawSuggestions = data.suggestions || data.result || [];

              suggestions.value =
                Array.isArray(rawSuggestions) && rawSuggestions.length
                  ? rawSuggestions
                  : [
                      {
                        title: "示例：常规机洗建议",
                        detail:
                          "使用冷水或30°C以下温水，选择柔和模式，深浅色分开洗涤，避免使用含氯漂白剂。",
                      },
                    ];
            } catch (e) {
              error.value =
                e && e.message
                  ? e.message
                  : "调用后端接口时发生未知错误，请稍后重试。";
            } finally {
              loading.value = false;
            }
          }

          return {
            selectedFiles,
            previews,
            clothType,
            color,
            material,
            stains,
            extraNotes,
            loading,
            error,
            suggestions,
            canSubmit,
            onFileChange,
            onDrop,
            onDragOver,
            removePreview,
            fillChip,
            submit,
          };
        },
        template: `
          <div class="card">
            <div class="card-left">
              <div class="header">
                <div class="title-group">
                  <h1>
                    LaundryHelper
                    <span class="title-pill">智能洗衣助手</span>
                  </h1>
                  <p>上传洗衣标 / 衣物照片，补充一点点信息，就能获得定制化洗护建议。</p>
                </div>
                <div class="badge">
                  <span class="badge-dot"></span>
                  实时识别 · 建议仅供参考
                </div>
              </div>

              <div
                class="section"
                @drop="onDrop"
                @dragover="onDragOver"
              >
                <div class="section-header">
                  <div class="section-title">1. 上传图片</div>
                  <div class="hint">支持拖拽，多张洗衣标 / 衣物细节</div>
                </div>

                <div class="upload-area">
                  <div class="upload-circle">
                    <svg viewBox="0 0 24 24" fill="none">
                      <path
                        d="M7 17h10M12 7v8m0-8 3.5 3.5M12 7 8.5 10.5"
                        stroke="currentColor"
                        stroke-width="1.5"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                      />
                      <rect
                        x="3.75"
                        y="3.75"
                        width="16.5"
                        height="16.5"
                        rx="3.25"
                        stroke="currentColor"
                        stroke-width="1.3"
                        opacity="0.7"
                      />
                    </svg>
                  </div>
                  <div class="upload-copy">
                    <div class="upload-copy-main">
                      拖拽图片到此处，或 <span>点击选择文件</span>
                    </div>
                    <div class="upload-copy-sub">
                      建议上传清晰的洗衣标特写，如有特殊污渍可另外拍一张。
                    </div>
                  </div>
                  <div class="upload-actions">
                    <label class="btn btn-secondary">
                      选择图片
                      <input
                        class="upload-input"
                        type="file"
                        accept="image/*"
                        multiple
                        @change="onFileChange"
                      />
                    </label>
                    <span class="hint">PNG · JPG · JPEG ≤ 10MB/张</span>
                  </div>
                </div>

                <div v-if="previews.length" class="preview-grid">
                  <div
                    v-for="item in previews"
                    :key="item.id"
                    class="preview-item"
                  >
                    <img :src="item.url" :alt="item.name" />
                    <div class="preview-meta">
                      <div>
                        <div>{{ item.name }}</div>
                        <div style="font-size: 0.7rem; opacity: 0.8">
                          {{ item.sizeKb }} KB
                        </div>
                      </div>
                      <button
                        type="button"
                        class="preview-remove"
                        @click="removePreview(item.id)"
                      >
                        移除
                      </button>
                    </div>
                  </div>
                </div>
              </div>

              <div class="section">
                <div class="section-header">
                  <div class="section-title">2. 补充洗衣信息（可选）</div>
                  <div class="hint">帮助模型给出更贴合的建议</div>
                </div>

                <div class="form-grid">
                  <div class="field">
                    <label>衣物类型</label>
                    <input
                      v-model="clothType"
                      placeholder="如：T恤、衬衫、羽绒服、毛衣..."
                    />
                    <div class="chips">
                      <button type="button" class="chip" @click="fillChip(clothType, 'T恤')">T恤</button>
                      <button type="button" class="chip" @click="fillChip(clothType, '衬衫')">衬衫</button>
                      <button type="button" class="chip" @click="fillChip(clothType, '羽绒服')">羽绒服</button>
                    </div>
                  </div>

                  <div class="field">
                    <label>颜色</label>
                    <select v-model="color">
                      <option value="">请选择</option>
                      <option value="浅色">浅色</option>
                      <option value="深色">深色</option>
                      <option value="纯白">纯白</option>
                      <option value="彩色">彩色</option>
                    </select>
                    <small>用于判断是否需要分开洗、是否可漂白等。</small>
                  </div>

                  <div class="field">
                    <label>面料 / 材质</label>
                    <input
                      v-model="material"
                      placeholder="如：纯棉、羊毛、丝绸、涤纶..."
                    />
                  </div>

                  <div class="field">
                    <label>是否有明显污渍</label>
                    <input
                      v-model="stains"
                      placeholder="如：油渍、咖啡渍、血渍，没有可留空"
                    />
                  </div>
                </div>

                <div class="field" style="margin-top: 10px;">
                  <label>其他补充说明</label>
                  <textarea
                    v-model="extraNotes"
                    placeholder="例如：担心缩水 / 掉色、没有洗衣机只能手洗、家里只有冷水等需求。"
                  ></textarea>
                </div>

                <div class="submit-row">
                  <div class="status-text">
                    <span :class="['status-dot', loading ? 'active' : '']"></span>
                    <span v-if="loading">正在识别洗衣标并生成建议...</span>
                    <span v-else>准备就绪，可随时提交识别请求。</span>
                  </div>
                  <button
                    type="button"
                    class="btn btn-primary"
                    :disabled="!canSubmit"
                    @click="submit"
                  >
                    {{ loading ? '识别中...' : '生成洗衣建议' }}
                  </button>
                </div>

                <div v-if="error" class="error-box">
                  {{ error }}
                </div>
              </div>
            </div>

            <div class="card-right">
              <div class="result-header">
                <div class="result-title">3. 洗护建议</div>
                <div class="tag">
                  根据洗衣标 + 你的补充信息生成
                </div>
              </div>

              <div class="result-body">
                <div v-if="!suggestions.length" class="empty-hint">
                  <span>🧺</span>
                  <div>还没有结果，上传洗衣标并点击右下角按钮，即可生成专属洗衣建议。</div>
                </div>

                <ul v-else class="suggestion-list">
                  <li
                    v-for="(item, index) in suggestions"
                    :key="index"
                    class="suggestion-item"
                  >
                    <div class="suggestion-index">
                      {{ index + 1 }}
                    </div>
                    <div class="suggestion-content">
                      <div v-if="item.title" class="suggestion-title">
                        {{ item.title }}
                      </div>
                      <div class="suggestion-detail">
                        {{ item.detail || item }}
                      </div>
                    </div>
                  </li>
                </ul>
              </div>
            </div>
